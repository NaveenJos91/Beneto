framework:
    secret: '%env(APP_SECRET)%'
    http_method_override: false
    handle_all_throwables: true
    php_errors:
        log: true
    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
    form: true
    csrf_protection: true
    validation:
        enable_attributes: true
        email_validation_mode: html5
